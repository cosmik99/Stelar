{% extends 'base.html' %}
{% block title %}{{ product.name }} - {{ block.super }}{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row">
    <div class="col-md-5">
      <img src="{{ product.image.url }}" alt="{{ product.name }}" class="img-fluid rounded shadow">
    </div>
    <div class="col-md-7">
      <h2>{{ product.name }}</h2>
      <p class="text-muted">{{ product.category.name }}</p>
      <p>{{ product.description }}</p>
      <h4 class="text-primary mb-4">${{ product.price }}</h4>

      <!-- ✅ Formulario para agregar al carrito -->
      <form action="{% url 'cart-action' %}" method="POST">
        {% csrf_token %}
        <input type="hidden" name="product" value="{{ product.id }}">
        <button type="submit" class="btn btn-success btn-lg">
          🛒 Agregar al carrito
        </button>
      </form>

      <a href="{% url 'store' %}" class="btn btn-outline-secondary mt-3">⬅ Volver a la tienda</a>
    </div>
  </div>
</div>
{% endblock %}
