{% extends 'base.html' %}
{% load crispy_forms_tags %} 

{% block title %}Registro - {{ block.super }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Crear Cuenta</h2>
                
                <form method="POST" action="{% url 'signup' %}">
                    {% csrf_token %} 
                    
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    
                    {% crispy form %} <button type="submit" class="btn btn-primary w-100">Registrarse</button>
                </form>
                
                <hr>
                <p class="text-center">
                    ¿Ya tienes una cuenta? <a href="{% url 'login' %}">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
