{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Registro - {{ block.super }}{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-body">
          <h3 class="text-center mb-4">Crear Cuenta</h3>

          <form method="POST" action="{% url 'signup' %}" id="signupForm">
            {% csrf_token %}

            
            <div class="mb-3">
              <label for="id_first_name" class="form-label">Nombre</label>
              <input type="text" name="first_name" id="id_first_name" class="form-control" required>
            </div>

            <div class="mb-3">
              <label for="id_last_name" class="form-label">Apellido</label>
              <input type="text" name="last_name" id="id_last_name" class="form-control" required>
            </div>

            <div class="mb-3">
              <label for="id_phone" class="form-label">Teléfono</label>
              <input type="text" name="phone" id="id_phone" class="form-control" required>
            </div>

            <div class="mb-3">
              <label for="id_email" class="form-label">Correo</label>
              <input type="email" name="email" id="id_email" class="form-control" required>
            </div>

            <div class="mb-3">
              <label for="id_password" class="form-label">Contraseña</label>
              <input type="password" name="password" id="id_password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Registrarse</button>
          </form>

          <hr>
          <p class="text-center">
            ¿Ya tienes una cuenta?
            <a href="{% url 'login' %}">Inicia sesión</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>


<script>
document.addEventListener("DOMContentLoaded", function() {
  const form = document.getElementById("signupForm");
  form.addEventListener("submit", function(e) {
    console.log("🚀 Enviando formulario...");
  });
});
</script>
{% endblock %}
